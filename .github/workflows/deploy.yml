name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# 같은 브랜치 새 push 들어오면 진행 중 deploy 취소 (배포 중복 방지)
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    # CI(lint/typecheck/build/e2e)가 성공한 commit에 대해서만 배포
    # (별도 workflow이지만 GitHub은 동일 commit에 대해 동시에 시작)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "▶ Deployed: $DEPLOY_URL"

      - name: Promote to primary alias
        run: |
          vercel alias set ${{ steps.deploy.outputs.deploy_url }} who-am-i-silk.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
