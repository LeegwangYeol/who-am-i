name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest

    steps:
      # 1) VERCEL_TOKEN secret이 없으면 이후 step을 전부 skip — 깨지지 않음.
      #    repo Settings → Secrets and variables → Actions 에 VERCEL_TOKEN 등록 시
      #    이 step 이후 모든 step이 실행되어 자동 배포가 시작됨.
      - name: Check VERCEL_TOKEN
        id: gate
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice title=VERCEL_TOKEN not set::Secret이 설정되지 않아 자동 배포를 건너뜁니다. (vercel CLI 수동 배포는 영향 없음)"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        if: steps.gate.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project info
        if: steps.gate.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        if: steps.gate.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.gate.outputs.configured == 'true'
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "▶ Deployed: $DEPLOY_URL"

      - name: Promote to primary alias
        if: steps.gate.outputs.configured == 'true'
        run: |
          vercel alias set ${{ steps.deploy.outputs.deploy_url }} who-am-i-silk.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
